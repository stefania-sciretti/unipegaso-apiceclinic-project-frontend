<div class="max-w-[1200px] mx-auto px-6 py-8">

  <!-- Header + filtro periodo -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-gray-900 ">Dashboard Admin</h1>

    <div class="flex rounded-lg overflow-hidden border border-[var(--border)]">
      @for (p of periods; track p.value; let i = $index) {
        <app-button
          [variant]="period() === p.value ? 'toggle-active' : 'toggle-inactive'"
          [extraClass]="i > 0 ? 'border-l border-[var(--border)]' : ''"
          (click)="selectPeriod(p.value)">
          {{ p.label }}
        </app-button>
      }
    </div>
  </div>

  <!-- Skeleton di caricamento (solo al primo caricamento, senza dati) -->
  @if (loading() && !stats()) {
    <div class="animate-pulse grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="rounded-xl bg-gray-200 h-48"></div>
      <div class="rounded-xl bg-gray-200 h-48"></div>
      <div class="rounded-xl bg-gray-200 h-64"></div>
      <div class="rounded-xl bg-gray-200 h-64"></div>
    </div>
  }

  <!-- Alert errore -->
  @if (error() && !loading()) {
    <div class="rounded-lg bg-red-50 border border-red-200 p-4 text-red-700 text-sm">
      Impossibile caricare i dati della dashboard. Riprova più tardi.
    </div>
  }

  <!-- Contenuto principale (rimane visibile durante i reload) -->
  @if (stats(); as s) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Riga 1: KPI + Donut -->
      <app-kpi-cards [kpi]="s.kpi" [period]="period()" />
      <app-service-donut [data]="s.revenueByArea" />
      <!-- Riga 2: Revenue + Appointments -->
      <app-revenue-chart [data]="s.revenueByMonth" [period]="period()" />
      <app-appointments-chart [data]="s.appointmentsByMonth" [period]="period()" />
    </div>
  }

</div>
